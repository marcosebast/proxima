name: Actualizar upcoming.json

on:
  schedule:
    # Corre el día 1 y el 15 de cada mes a las 6:00 AM UTC (3:00 AM Buenos Aires)
    - cron: '0 6 1 * *'
    - cron: '0 6 15 * *'
  # También permite correrlo manualmente desde GitHub Actions
  workflow_dispatch:

jobs:
  update-upcoming:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar upcoming.json
        run: node generate-upcoming.mjs

      - name: Commitear upcoming.json actualizado
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add upcoming.json
          git diff --staged --quiet || git commit -m "chore: actualizar upcoming.json [$(date +%Y-%m-%d)]"
          git push
