name: Actualizar upcoming.json

on:
  schedule:
    - cron: '0 6 1 * *'
    - cron: '0 6 15 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-upcoming:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generar upcoming.json
        run: node generate-upcoming.mjs

      - name: Commitear upcoming.json actualizado
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add upcoming.json
          git diff --staged --quiet || git commit -m "chore: actualizar upcoming.json [$(date +%Y-%m-%d)]"
          git push