name: Actualizar artist-graph.json

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 1 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generar artist-graph.json
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node build-artist-graph.mjs

      - name: Commitear artist-graph.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artist-graph.json
          git diff --staged --quiet || git commit -m "chore: actualizar artist-graph.json [$(date +%Y-%m-%d)]"
          git push
